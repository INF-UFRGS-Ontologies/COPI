# PURL configuration for http://purl.obolibrary.org/obo/copi

idspace: COPI
base_url: /obo/copi

products:
- copi.owl: https://raw.githubusercontent.com/INF-UFRGS-Ontologies/copi/master/copi.owl
- copi.obo: https://raw.githubusercontent.com/INF-UFRGS-Ontologies/copi/master/copi.obo

term_browser: ontobee
example_terms:
- COPI_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/INF-UFRGS-Ontologies/copi/v

- prefix: /tracker/
  replacement: https://github.com/INF-UFRGS-Ontologies/copi/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/COPI?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/INF-UFRGS-Ontologies/copi/master/

