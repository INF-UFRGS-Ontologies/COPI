name: Build release artefacts and deploy to UFRGS server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate ODK release artefacts
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release artefacts
        run: |
          cd src/ontology
          rm -rf tmp/
          make prepare_release IMP=false PAT=false MIR=false COMP=false

      - name: Commit artefacts to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add copi.owl copi.ttl copi-base.owl copi-base.ttl copi-full.owl copi-full.ttl copi-simple.owl copi-simple.ttl
          git diff --cached --quiet || git commit -m "chore: update release artefacts [skip ci]"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +%Y-%m-%d)"
          gh release create "$TAG" \
            copi.owl copi.ttl \
            copi-base.owl copi-base.ttl \
            copi-full.owl copi-full.ttl \
            copi-simple.owl copi-simple.ttl \
            --title "$TAG" \
            --notes "Automated release generated by ODK. Version IRI: https://www.inf.ufrgs.br/ontologies/copi/releases/$(date +%Y-%m-%d)/copi.owl (canonical: https://www.inf.ufrgs.br/ontologies/copi/copi.owl)" \
            --repo ${{ github.repository }} \
          || echo "Release $TAG already exists, skipping."

  deploy:
    name: File transfer to ontologies website
    needs: generate
    runs-on: arc-runner-copi

    env:
      ONTOLOGY: copi
      REMOTE_BASE_PATH: ../ontologies/public_html/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set release date
        run: echo "RELEASE_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      # Remove pre-ODR-015 orphan files from the server root (public_html/).
      # Before the canonical IRI migration, deploy.yml uploaded copi*.owl/ttl directly
      # to public_html/, so https://…/ontologies/copi.owl was the canonical IRI.
      # That path now serves stale pre-migration content (17 COPI classes vs 94 today).
      # Deleting them produces 404, which is honest; a 301 redirect is not possible
      # without shell access to configure Apache. Dylan700/sftp-upload-action has no
      # chmod support, so we use lftp (SFTP-native chmod/rm, no shell required).
      # set cmd:fail-exit false + glob makes this idempotent: silent no-op once gone.
      - name: Ensure lftp is available
        run: command -v lftp >/dev/null 2>&1 || sudo apt-get install -y -q lftp

      - name: Remove stale root OWL/TTL (pre-migration orphans → 404)
        env:
          SFTP_PASS: ${{ secrets.FTP }}
          SFTP_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          lftp -u "ontokg,${SFTP_PASS}" "sftp://${SFTP_HOST}" -e "
            set net:timeout 30;
            set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no';
            set cmd:fail-exit false;
            cd ../ontologies/public_html;
            glob rm copi.owl copi.ttl copi-base.owl copi-base.ttl copi-full.owl copi-full.ttl copi-simple.owl copi-simple.ttl;
            quit"

      - name: Transfer HTML docs to copi/ folder
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            docs/ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/

      - name: Transfer OWL/TTL variants to copi/ folder
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            ./ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/
          ignore: |
            !copi.owl
            !copi.ttl
            !copi-base.owl
            !copi-base.ttl
            !copi-full.owl
            !copi-full.ttl
            !copi-simple.owl
            !copi-simple.ttl

      - name: Transfer versioned snapshot to copi/releases/
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            ./ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/releases/${{ env.RELEASE_DATE }}/
          ignore: |
            !copi.owl
            !copi.ttl
            !copi-base.owl
            !copi-base.ttl
            !copi-full.owl
            !copi-full.ttl
            !copi-simple.owl
            !copi-simple.ttl

      # Dylan700/sftp-upload-action has no file-mode parameter (confirmed: inputs are
      # server, username, password, key, passphrase, port, dry-run, uploads, ignore,
      # ignore-from, delete — no chmod). Files land with permission 600 (owner-only),
      # which Apache cannot read, causing 403. Fix: lftp chmod over SFTP.
      #
      # Strategy (no hardcoded filenames or dates):
      #   - glob chmod 644 *.owl *.ttl  → all OWL/TTL in copi/ root (skips docs/ HTML)
      #   - chmod 755 releases           → releases/ dir traversal
      #   - chmod 755 releases/${RELEASE_DATE} → date subdir (dynamic from env)
      #   - glob chmod 644 in date subdir → all OWL/TTL in the snapshot (no fixed list)
      # RELEASE_DATE is expanded by bash before lftp sees the string; not hardcoded.
      - name: Fix file permissions (chmod 644 OWL/TTL, 755 dirs via SFTP)
        env:
          SFTP_PASS: ${{ secrets.FTP }}
          SFTP_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          lftp -u "ontokg,${SFTP_PASS}" "sftp://${SFTP_HOST}" -e "
            set net:timeout 30;
            set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no';
            cd ../ontologies/public_html/copi;
            glob chmod 644 *.owl;
            glob chmod 644 *.ttl;
            chmod 755 releases;
            chmod 755 releases/${RELEASE_DATE};
            cd releases/${RELEASE_DATE};
            glob chmod 644 *.owl;
            glob chmod 644 *.ttl;
            quit"
