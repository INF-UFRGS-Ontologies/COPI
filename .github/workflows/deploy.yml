name: Build release artefacts and deploy to UFRGS server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate ODK release artefacts
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 node24
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release artefacts
        run: |
          cd src/ontology
          rm -rf tmp/
          make prepare_release IMP=false PAT=false MIR=false COMP=false

      - name: Commit artefacts to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add copi.owl copi.ttl copi-base.owl copi-base.ttl copi-full.owl copi-full.ttl copi-simple.owl copi-simple.ttl
          git diff --cached --quiet || git commit -m "chore: update release artefacts [skip ci]"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +%Y-%m-%d)"
          gh release create "$TAG" \
            copi.owl copi.ttl \
            copi-base.owl copi-base.ttl \
            copi-full.owl copi-full.ttl \
            copi-simple.owl copi-simple.ttl \
            --title "$TAG" \
            --notes "Automated release generated by ODK. Version IRI: https://www.inf.ufrgs.br/ontologies/copi/releases/$(date +%Y-%m-%d)/copi.owl (canonical: https://www.inf.ufrgs.br/ontologies/copi/copi.owl)" \
            --repo ${{ github.repository }} \
          || echo "Release $TAG already exists, skipping."

  deploy:
    name: File transfer to ontologies website
    needs: generate
    runs-on: arc-runner-copi

    env:
      ONTOLOGY: copi
      REMOTE_BASE_PATH: ../ontologies/public_html/
      # Dylan700/sftp-upload-action@v1.2.3 declares node20; GitHub enforces node24
      # from 2026-06-16. This override allows node20 actions until September 2026,
      # when it will be removed. Tracked in: fix/sftp-revert-node20 PR #9.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 node24
        with:
          ref: main

      - name: Set release date
        run: echo "RELEASE_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      # Stale pre-migration OWL/TTL orphans at public_html/ root are DEFERRED.
      # They are the only COPI content currently serving; retire them only after
      # copi/copi.owl is confirmed live and returning 200.

      - name: Transfer HTML docs to copi/ folder
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec  # v1.2.3 node20; confirmed working in PR #5
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            docs/ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/

      # Remove stale sequential-IRI class pages (COPI_0000001–0000071, 0000089)
      # that were generated before the IRI correction in commit cc6f14a.
      # These IRIs collided with the core ontology range; canonical pages now live
      # at COPI_0000072+. The sftp-upload-action cannot delete remote files, so
      # we use the sftp binary (present on arc-runner-copi at /usr/bin/sftp) with
      # a batch file and sshpass-style password injection via SSH_ASKPASS.
      # apt-get install lftp fails silently (not in configured repos without sudo).
      - name: Delete stale pre-migration class pages from server
        env:
          SFTP_PASS: ${{ secrets.FTP }}
          SFTP_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_CLASSES: ../ontologies/public_html/copi/classes
        run: |
          # Write an sftp batch file with rm commands for each stale IRI
          BATCH=$(mktemp /tmp/sftp-batch-XXXXXX.txt)
          for i in $(seq 1 71) 89; do
            echo "rm ${REMOTE_CLASSES}/COPI_$(printf '%07d' $i).html" >> "$BATCH"
          done
          echo "bye" >> "$BATCH"

          # SSH_ASKPASS + DISPLAY trick: sftp reads password from askpass script
          ASKPASS=$(mktemp /tmp/ssh-askpass-XXXXXX.sh)
          echo "#!/bin/sh" > "$ASKPASS"
          echo "echo \"\$SFTP_PASS\"" >> "$ASKPASS"
          chmod +x "$ASKPASS"

          export SSH_ASKPASS="$ASKPASS"
          export DISPLAY=:0   # non-empty DISPLAY triggers SSH_ASKPASS on OpenSSH

          # UFRGS server offers ssh-rsa/ssh-dss; modern OpenSSH disables these by
          # default. Enable legacy key types to match the sftp-upload-action
          # (Node.js ssh2-sftp-client, which accepts them).
          sftp -oBatchMode=no -oStrictHostKeyChecking=no \
               -oHostKeyAlgorithms=+ssh-rsa \
               -oPubkeyAcceptedAlgorithms=+ssh-rsa \
               -b "$BATCH" \
               "ontokg@${SFTP_HOST}" 2>&1 \
            || echo "sftp delete step completed (some files may not have existed)"
          rm -f "$BATCH" "$ASKPASS"

      # Dylan700/sftp-upload-action uses minimatch with some() (OR) logic:
      # a `!file` pattern matches every file that is NOT that file, so with only
      # negation entries every file satisfies some() → is_uploadable always false →
      # zero uploads. Fix: stage only the 8 target files so no ignore is needed.
      #
      # Source path must be workspace-relative (like docs/ which works). An absolute
      # /tmp path is silently swallowed by Promise.allSettled in the action even if
      # ssh2-sftp-client cannot access it from the runner's JavaScript context.
      - name: Stage OWL/TTL artefacts for upload
        run: |
          mkdir -p copi-stage
          cp copi.owl copi.ttl \
             copi-base.owl copi-base.ttl \
             copi-full.owl copi-full.ttl \
             copi-simple.owl copi-simple.ttl \
             copi-stage/
          ls -la copi-stage/

      - name: Transfer OWL/TTL variants to copi/ folder
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec  # v1.2.3 node20; confirmed working in PR #5
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            copi-stage/ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/

      - name: Transfer versioned snapshot to copi/releases/
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec  # v1.2.3 node20; confirmed working in PR #5
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            copi-stage/ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/releases/${{ env.RELEASE_DATE }}/
