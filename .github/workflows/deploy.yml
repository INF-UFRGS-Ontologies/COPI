name: Build release artefacts and deploy to UFRGS server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate ODK release artefacts
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 node24
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release artefacts
        run: |
          cd src/ontology
          rm -rf tmp/
          make prepare_release IMP=false PAT=false MIR=false COMP=false

      - name: Commit artefacts to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add copi.owl copi.ttl copi-base.owl copi-base.ttl copi-full.owl copi-full.ttl copi-simple.owl copi-simple.ttl
          git diff --cached --quiet || git commit -m "chore: update release artefacts [skip ci]"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +%Y-%m-%d)"
          gh release create "$TAG" \
            copi.owl copi.ttl \
            copi-base.owl copi-base.ttl \
            copi-full.owl copi-full.ttl \
            copi-simple.owl copi-simple.ttl \
            --title "$TAG" \
            --notes "Automated release generated by ODK. Version IRI: https://www.inf.ufrgs.br/ontologies/copi/releases/$(date +%Y-%m-%d)/copi.owl (canonical: https://www.inf.ufrgs.br/ontologies/copi/copi.owl)" \
            --repo ${{ github.repository }} \
          || echo "Release $TAG already exists, skipping."

  deploy:
    name: File transfer to ontologies website
    needs: generate
    runs-on: arc-runner-copi

    env:
      ONTOLOGY: copi
      REMOTE_BASE_PATH: ../ontologies/public_html/
      # Dylan700/sftp-upload-action@v1.2.3 declares node20; GitHub enforces node24
      # from 2026-06-16. This override allows node20 actions until September 2026,
      # when it will be removed. Tracked in: fix/sftp-revert-node20 PR #9.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 node24
        with:
          ref: main

      - name: Set release date
        run: echo "RELEASE_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      # Stale pre-migration OWL/TTL orphans at public_html/ root are DEFERRED.
      # They are the only COPI content currently serving; retire them only after
      # copi/copi.owl is confirmed live and returning 200.

      - name: Transfer HTML docs to copi/ folder
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec  # v1.2.3 node20; confirmed working in PR #5
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            docs/ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/

      - name: Stage OWL/TTL artefacts for upload
        run: |
          mkdir -p copi-stage
          cp copi.owl copi.ttl \
             copi-base.owl copi-base.ttl \
             copi-full.owl copi-full.ttl \
             copi-simple.owl copi-simple.ttl \
             index.php \
             copi-stage/
          ls -la copi-stage/

      # Dylan700/sftp-upload-action silently truncates existing files to 0 bytes when
      # Node.js 20 runs under the node24 enforcement that started June 2026. It does
      # not error — it just produces 0-byte remote files.  Replaced with paramiko so
      # we get an explicit size-verified upload that fails CI on any mismatch.
      - name: Transfer OWL/TTL variants to copi/ folder
        run: |
          python3 -m pip install --quiet paramiko 2>/dev/null \
            || apt-get install -y -q python3-paramiko 2>/dev/null \
            || sudo apt-get install -y -q python3-paramiko
          python3 - << 'PYEOF'
          import paramiko, os, sys
          host     = os.environ['DEPLOY_HOST']
          password = os.environ['FTP_PASS']
          remote_base = '../ontologies/public_html/copi'
          stage_dir   = 'copi-stage'
          ssh = paramiko.SSHClient()
          ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          ssh.connect(host, port=22, username='ontokg', password=password, timeout=30)
          sftp = ssh.open_sftp()
          failed = False
          for fname in sorted(os.listdir(stage_dir)):
              local_path  = os.path.join(stage_dir, fname)
              remote_path = f'{remote_base}/{fname}'
              local_size  = os.path.getsize(local_path)
              print(f'Uploading {fname} ({local_size:,} bytes) …', flush=True)
              sftp.put(local_path, remote_path)
              remote_size = sftp.stat(remote_path).st_size
              if remote_size != local_size:
                  print(f'  FAIL: remote={remote_size:,} local={local_size:,}', flush=True)
                  failed = True
              else:
                  print(f'  OK ({remote_size:,} bytes verified)', flush=True)
          sftp.close()
          ssh.close()
          sys.exit(1 if failed else 0)
          PYEOF
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          FTP_PASS: ${{ secrets.FTP }}

      - name: Transfer versioned snapshot to copi/releases/
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec  # v1.2.3 node20; confirmed working in PR #5
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            copi-stage/ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/releases/${{ env.RELEASE_DATE }}/
