name: Build release artefacts and deploy to UFRGS server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate ODK release artefacts
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release artefacts
        run: |
          cd src/ontology
          make prepare_release IMP=false PAT=false MIR=false COMP=false

      - name: Commit artefacts to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add copi.owl copi.ttl copi-base.owl copi-base.ttl copi-full.owl copi-full.ttl copi-simple.owl copi-simple.ttl
          git diff --cached --quiet || git commit -m "chore: update release artefacts [skip ci]"
          git push

  deploy:
    name: File transfer to ontologies website
    needs: generate
    runs-on: arc-runner

    env:
      ONTOLOGY: copi
      REMOTE_BASE_PATH: ../ontologies/public_html/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Transfer HTML docs to copi/ folder
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: 143.54.11.25
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            docs/ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/

      - name: Transfer OWL/TTL variants to copi/ folder
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: 143.54.11.25
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            ./ => ${{ env.REMOTE_BASE_PATH }}${{ env.ONTOLOGY }}/
          ignore: |
            !copi-base.owl
            !copi-base.ttl
            !copi-full.owl
            !copi-full.ttl
            !copi-simple.owl
            !copi-simple.ttl

      - name: Transfer primary copi.owl to ontologies root
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: 143.54.11.25
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            ./ => ${{ env.REMOTE_BASE_PATH }}
          ignore: |
            !copi.owl

      - name: Transfer primary copi.ttl to ontologies root
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: 143.54.11.25
          username: ontokg
          password: ${{ secrets.FTP }}
          port: 22
          uploads: |
            ./ => ${{ env.REMOTE_BASE_PATH }}
          ignore: |
            !copi.ttl
